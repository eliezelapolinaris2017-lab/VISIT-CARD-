<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Oasis Visit Card</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#05070b" />
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="brand-mark">OASIS</div>
      <h1>Visit Card</h1>
      <p>Expediente visual de servicio</p>
      <button id="loginBtn" class="primary-btn">Entrar con Google</button>
    </div>
  </div>

  <main id="app" class="app hidden">
    <header class="topbar">
      <div>
        <span class="eyebrow">Oasis One</span>
        <h1>Visit Card</h1>
      </div>
      <div class="top-actions">
        <button id="settingsBtn" class="ghost-btn">Config</button>
        <button id="logoutBtn" class="ghost-btn">Salir</button>
      </div>
    </header>

    <section class="kpi-grid">
      <article class="kpi-card"><span>Visitas</span><strong id="kpiVisits">0</strong></article>
      <article class="kpi-card"><span>Clientes</span><strong id="kpiClients">0</strong></article>
      <article class="kpi-card"><span>Promedio Health</span><strong id="kpiHealth">—</strong></article>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="newVisit">Nueva Visita</button>
      <button class="tab" data-tab="history">Historial</button>
      <button class="tab" data-tab="clients">Clientes</button>
    </nav>

    <section id="newVisit" class="panel active">
      <form id="visitForm" class="form-grid">
        <div class="section-title">Cliente</div>
        <input name="clientName" placeholder="Nombre del cliente" required />
        <input name="clientPhone" placeholder="Teléfono / WhatsApp" />
        <input name="clientAddress" placeholder="Dirección" />

        <div class="section-title">Equipo</div>
        <input name="brand" placeholder="Marca" />
        <input name="model" placeholder="Modelo" />
        <input name="btu" placeholder="BTU" />
        <input name="serial" placeholder="Serial" />

        <div class="section-title">Servicio</div>
        <select name="serviceType">
          <option>Mantenimiento Preventivo</option>
          <option>Mantenimiento Profundo</option>
          <option>Diagnóstico</option>
          <option>Reparación</option>
          <option>Instalación</option>
        </select>
        <input name="technician" placeholder="Técnico" />
        <input name="nextVisit" type="date" />

        <div class="section-title">Estado del sistema</div>
        <label>Enfriamiento <input name="cooling" type="range" min="0" max="100" value="85" /></label>
        <label>Presión <input name="pressure" type="range" min="0" max="100" value="85" /></label>
        <label>Drenaje <input name="drain" type="range" min="0" max="100" value="85" /></label>
        <label>Evaporador <input name="evaporator" type="range" min="0" max="100" value="85" /></label>
        <label>Condensador <input name="condenser" type="range" min="0" max="100" value="85" /></label>

        <div class="score-preview"><span>Health Score</span><strong id="healthPreview">85</strong></div>

        <div class="section-title">Evidencia</div>
        <label class="file-box">Fotos antes <input id="beforePhotos" type="file" accept="image/*" multiple /></label>
        <label class="file-box">Fotos después <input id="afterPhotos" type="file" accept="image/*" multiple /></label>

        <div class="section-title">Observaciones</div>
        <textarea name="notes" placeholder="Observaciones técnicas"></textarea>
        <textarea name="recommendations" placeholder="Recomendaciones"></textarea>

        <button class="primary-btn full" type="submit">Guardar visita</button>
      </form>
    </section>

    <section id="history" class="panel">
      <div class="toolbar">
        <input id="searchInput" placeholder="Buscar cliente, marca, serial..." />
      </div>
      <div id="visitList" class="cards"></div>
    </section>

    <section id="clients" class="panel">
      <div id="clientList" class="cards"></div>
    </section>
  </main>

  <dialog id="settingsDialog" class="dialog">
    <form id="settingsForm">
      <h2>Configuración</h2>
      <input name="businessName" placeholder="Nombre del negocio" />
      <input name="businessPhone" placeholder="Teléfono" />
      <input name="businessEmail" placeholder="Email" />
      <input name="businessAddress" placeholder="Dirección" />
      <label class="file-box">Logo <input id="logoFile" type="file" accept="image/*" /></label>
      <div class="dialog-actions">
        <button type="button" id="closeSettings" class="ghost-btn">Cerrar</button>
        <button class="primary-btn" type="submit">Guardar</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
